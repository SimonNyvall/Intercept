<div class="input-group">
    <select>
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>PATCH</option>
        <option>DELETE</option>
    </select>
    <input type="text" placeholder="http://example.com">
    <div>
        <button click.trigger="sendRequest()">Send</button>
    </div>
</div>

<div>
    <tab-request
        request.bind="request"></tab-request>
</div>
